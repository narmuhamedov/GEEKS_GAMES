{% load static %}
{% include 'layout/header.html' %}

<style>
    /* Главный контейнер для контента */
.mk-container {
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 20px;
    min-height: 60vh; /* Чтобы футер не прилипал к верху */
}

/* Главный заголовок страницы */
.mk-page-title {
    color: #fff;
    text-transform: uppercase;
    font-size: 32px;
    text-align: center;
    margin-bottom: 40px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(255, 69, 0, 0.5);
    border-bottom: 1px solid #333;
    padding-bottom: 15px;
}

/* Сетка для карточек персонажей */
.mk-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 30px;
}

/* Карточка персонажа */
.mk-card {
    background: linear-gradient(135deg, #151515 0%, #0d0d0d 100%);
    border: 2px solid #222;
    border-top: 4px solid #cca300; /* Золотая плашка сверху */
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

/* Эффект наведения на карточку */
.mk-card:hover {
    border-color: #ff4500;
    border-top-color: #ff4500;
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(255, 69, 0, 0.2);
}

/* Имя и прозвище */
.mk-card-header {
    text-align: center;
    margin-bottom: 15px;
    border-bottom: 1px solid #222;
    padding-bottom: 10px;
}

.mk-char-name {
    color: #fff;
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.mk-char-nickname {
    color: #ff4500;
    font-size: 13px;
    display: block;
    margin-top: 5px;
}

/* Блок оружия */
.mk-card-body {
    flex-grow: 1;
    margin-bottom: 20px;
}

.mk-weapon-title {
    color: #666;
    font-size: 11px;
    text-transform: uppercase;
    margin-bottom: 8px;
    letter-spacing: 1px;
}

.mk-weapon-list {
    list-style: none;
}

.mk-weapon-item {
    color: #cca300;
    font-size: 14px;
    padding: 4px 0;
    position: relative;
    padding-left: 15px;
}

/* Иконка-точка перед оружием в виде маленького красного квадрата */
.mk-weapon-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: 6px;
    background-color: #ff4500;
}

/* Кнопка в карточке */
.mk-card-btn {
    display: block;
    text-align: center;
    background-color: #1a1a1a;
    color: #fff;
    text-decoration: none;
    text-transform: uppercase;
    font-size: 12px;
    padding: 10px;
    border: 1px solid #ff4500;
    font-weight: bold;
    transition: all 0.3s ease;
}

.mk-card-btn:hover {
    background-color: #ff4500;
    box-shadow: 0 0 10px #ff4500;
}

</style>

<main class="mk-container">
    <h1 class="mk-page-title">{{ title }}</h1>

    <div class="mk-grid">
        {% for i in characters %}
        <div class="mk-card">
            <!-- Заголовок карточки с именем -->
            <div class="mk-card-header">
                <h2 class="mk-char-name">{{ i.name }}</h2>
                <span class="mk-char-nickname">«{{ i.nickname }}»</span>
            </div>
            
            <!-- Блок с оружием бойца -->
            <div class="mk-card-body">
                <h3 class="mk-weapon-title">Оружие / Стиль:</h3>
                <ul class="mk-weapon-list">
                    {% for j in i.weapons %}
                    <li class="mk-weapon-item">{{ j }}</li>
                    {% endfor %}
                </ul>
            </div>
            
            <!-- Кнопка действия -->
            <div class="mk-card-footer">
                <a href="#" class="mk-card-btn">Выбрать бойца</a>
            </div>
        </div>
        {% endfor %}
    </div>
</main>

{% include 'layout/footer.html' %}
